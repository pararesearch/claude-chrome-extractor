<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #f8fafc; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 10px 12px; background: #1e293b; border-radius: 8px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .info { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
    .query-box { display: flex; flex-direction: column; gap: 8px; }
    textarea { width: 100%; padding: 8px 10px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: 13px; resize: vertical; min-height: 60px; font-family: inherit; }
    textarea:focus { outline: none; border-color: #6366f1; }
    button { padding: 8px 16px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 12px; padding: 10px; background: #1e293b; border-radius: 6px; font-size: 12px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <h1>Claude Chrome Extractor</h1>
  <div class="status" id="status">
    <div class="dot off" id="dot"></div>
    <span id="statusText">Disconnected</span>
  </div>
  <p class="info">Ask Claude about the current page, or send queries via the API.</p>
  <div class="query-box">
    <textarea id="query" placeholder="Ask something about this page..."></textarea>
    <button id="ask" disabled>Extract</button>
  </div>
  <div class="result" id="result" style="display:none;"></div>

  <script src="popup.js"></script>
</body>
</html>
